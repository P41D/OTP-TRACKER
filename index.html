<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body id="body">
  <!-- Spinner -->
  <div id="spinnerContainer" class="spinner-container">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only" style="color: black;">Loading...</span>
    </div>
  </div> 

  <!-- Main Content -->
  <div id="content">
    <iframe id="myIframe"></iframe>
  </div>

  <!-- Footer -->
  <footer id="footer" class="footer-1" style="display: none;">
    <div class="footer-copyright">
      <div class="container">
        <div class="row">
          <div class="col-md-12 text-center">
            <p>Copyright <a id="brand" href="https://t.me/eloraph" target="_blank">ELORAHUB ❤️</a> © <span id="year"></span>. All rights reserved.</p>
          </div>
        </div>
      </div>
    </div>
  </footer>




<script>
    // Define brand name and domain
    var brandname = "ELORAHUB ❤️";
    var maindomain = "ELORAHUB";
    var appScript = "https://script.google.com/macros/s/AKfycbxsHlkq4mEBCgsiAXHayw7IjH2bBfwhk0HkRk7irfkYlO_a51PjoHsENVp7I0OyzqvW7w/exec";
    var footer = "block"; //CHANGE BLOCK TO none TO HIDE THE FOOTER

    // YOUR FUNCTION (Kept exactly as requested)
    function modifyAppScriptURL() {
      var modifiedURL = appScript.replace("https://script.google.com/", "https://script.google.com/a/*/");
      return modifiedURL;
    }
    
    // Generate the modified URL
    var appScriptURL = modifyAppScriptURL();

    // THE FIX: Wait for the page to load, then push the modified URL into the iframe
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("myIframe").src = appScriptURL;
    });
  </script>

</html>
